name: Pipeline checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate required documents and naming rules
        run: python scripts/check_pipeline.py
